services:
  postgres:
    image: postgres:15
    container_name: decision-engine-db
    environment:
      POSTGRES_DB: risk_engine_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d  # Mount the local directory into the container

  risk-engine:
    build: .
    container_name: decision-engine-app
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: risk_engine_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "8000:8000"

volumes:
  postgres_data:
