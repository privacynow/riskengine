name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Frontend quality gates
        run: |
          cd ui
          npm ci
          npm audit --audit-level=high --omit=optional
          npm run typecheck
          npm run lint
          npm run test:unit
          npm run build

      - name: Generate demo env
        run: bash scripts/create_demo_env.sh

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for app
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8000/docs >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time"
          docker compose ps
          docker compose logs postgres
          docker compose logs risk-engine
          exit 1

      - name: Pytest
        run: docker compose exec -T -e RUN_INTEGRATION_TESTS=1 risk-engine pytest -q

      - name: Smoke test
        run: bash scripts/smoke_test.sh

      - name: Scripts toolchain audit
        run: |
          cd scripts
          npm ci --no-fund --no-audit
          npm audit --audit-level=high --omit=optional

      - name: UI smoke test
        run: bash scripts/ui_smoke.sh

      - name: Playwright behavioral e2e
        run: bash scripts/run_playwright_blocking_ci.sh

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-behavioral-results
          path: |
            ui/test-results
            ui/playwright-report
          if-no-files-found: ignore

      - name: Whitespace check
        run: git diff --check

  visual-review:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Generate demo env
        run: bash scripts/create_demo_env.sh

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for app
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8000/docs >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time"
          exit 1

      - name: Install UI toolchain for Playwright
        run: |
          cd ui
          npm ci --no-fund --no-audit
          npx playwright install chromium

      - name: Visual snapshot review (non-blocking)
        run: bash scripts/run_playwright_visual_ci.sh

      - name: Upload visual review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-review
          path: |
            ui/test-results
            ui/playwright-report
            ui/src/tests/e2e/visual-review.spec.ts-snapshots
          if-no-files-found: ignore
